<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TETRIS</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #07090f;
    --panel: #0d1117;
    --border: rgba(80, 200, 255, 0.2);
    --cyan: #50c8ff;
    --magenta: #ff2d78;
    --yellow: #ffe600;
    --green: #39ff6e;
    --glow-cyan: 0 0 12px #50c8ff, 0 0 30px rgba(80,200,255,0.3);
  }

  body {
    background: var(--bg);
    font-family: 'Share Tech Mono', monospace;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    overflow: hidden;
    color: var(--cyan);
  }

  /* Scanlines */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,0,0,0.15) 2px,
      rgba(0,0,0,0.15) 4px
    );
    pointer-events: none;
    z-index: 100;
  }

  /* CRT vignette */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: radial-gradient(ellipse at center, transparent 55%, rgba(0,0,0,0.8) 100%);
    pointer-events: none;
    z-index: 99;
  }

  .layout {
    display: flex;
    gap: 0;
    align-items: flex-start;
    position: relative;
    z-index: 1;
  }

  /* SIDE PANEL LEFT */
  .side-panel {
    width: 140px;
    padding: 20px 16px;
    display: flex;
    flex-direction: column;
    gap: 24px;
    border: 1px solid var(--border);
    background: var(--panel);
    height: 620px;
    position: relative;
  }

  .side-panel.left { border-right: none; }
  .side-panel.right { border-left: none; }

  .panel-label {
    font-family: 'Orbitron', sans-serif;
    font-size: 8px;
    letter-spacing: 3px;
    color: rgba(80,200,255,0.5);
    text-transform: uppercase;
    margin-bottom: 4px;
  }

  .panel-value {
    font-family: 'Orbitron', sans-serif;
    font-size: 22px;
    font-weight: 900;
    color: var(--cyan);
    text-shadow: var(--glow-cyan);
    line-height: 1;
  }

  .panel-value.magenta {
    color: var(--magenta);
    text-shadow: 0 0 12px var(--magenta), 0 0 30px rgba(255,45,120,0.3);
  }

  /* NEXT PIECE PREVIEW */
  #nextCanvas {
    border: 1px solid var(--border);
    background: rgba(0,0,0,0.5);
    display: block;
    margin-top: 4px;
  }

  /* MAIN CANVAS */
  .game-wrapper {
    position: relative;
    display: flex;
    flex-direction: column;
  }

  .title-bar {
    background: var(--panel);
    border: 1px solid var(--border);
    border-bottom: none;
    padding: 10px 20px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .title-bar h1 {
    font-family: 'Orbitron', sans-serif;
    font-size: 24px;
    font-weight: 900;
    letter-spacing: 10px;
    color: var(--cyan);
    text-shadow: var(--glow-cyan);
    animation: titlePulse 3s ease-in-out infinite;
  }

  @keyframes titlePulse {
    0%,100% { text-shadow: var(--glow-cyan); }
    50% { text-shadow: 0 0 20px var(--cyan), 0 0 60px rgba(80,200,255,0.5); }
  }

  #gameCanvas {
    display: block;
    border: 1px solid var(--border);
    background: #060810;
    box-shadow: inset 0 0 60px rgba(0,0,0,0.9), 0 0 40px rgba(80,200,255,0.05);
  }

  /* OVERLAY */
  #overlay {
    position: absolute;
    top: 52px; /* below title bar */
    left: 0; right: 0; bottom: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 20px;
    background: rgba(6,8,16,0.92);
    backdrop-filter: blur(3px);
    transition: opacity 0.3s;
    z-index: 10;
  }

  #overlay.hidden { opacity: 0; pointer-events: none; }

  .overlay-title {
    font-family: 'Orbitron', sans-serif;
    font-size: 22px;
    font-weight: 900;
    color: var(--cyan);
    text-shadow: var(--glow-cyan);
    letter-spacing: 4px;
    text-align: center;
  }

  .overlay-sub {
    font-size: 11px;
    color: rgba(80,200,255,0.6);
    text-align: center;
    line-height: 2.2;
  }

  .btn {
    font-family: 'Orbitron', sans-serif;
    font-size: 11px;
    font-weight: 700;
    padding: 12px 30px;
    background: transparent;
    color: var(--cyan);
    border: 2px solid var(--cyan);
    cursor: pointer;
    letter-spacing: 3px;
    text-shadow: var(--glow-cyan);
    box-shadow: 0 0 14px rgba(80,200,255,0.3), inset 0 0 14px rgba(80,200,255,0.05);
    transition: all 0.15s;
    clip-path: polygon(8px 0%, 100% 0%, calc(100% - 8px) 100%, 0% 100%);
  }

  .btn:hover {
    background: rgba(80,200,255,0.1);
    box-shadow: 0 0 28px rgba(80,200,255,0.5), inset 0 0 20px rgba(80,200,255,0.1);
  }

  /* Mobile controls */
  .mobile-controls {
    display: none;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    margin-top: 12px;
  }

  @media (max-width: 700px) {
    .mobile-controls { display: flex; }
    .side-panel { width: 80px; padding: 12px 8px; }
    .panel-value { font-size: 14px; }
  }

  .ctrl-row { display: flex; gap: 6px; }

  .ctrl-btn {
    width: 44px; height: 44px;
    background: rgba(80,200,255,0.08);
    border: 1px solid var(--border);
    color: var(--cyan);
    font-size: 18px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
    transition: background 0.1s;
  }

  .ctrl-btn:active { background: rgba(80,200,255,0.2); }

  /* Line clear flash */
  @keyframes lineClear {
    0% { opacity: 1; }
    50% { opacity: 0.2; }
    100% { opacity: 1; }
  }

  /* ── HEART EASTER EGG ── */
  #heartContainer {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 200;
    overflow: hidden;
  }

  .heart-particle {
    position: absolute;
    top: -60px;
    animation: heartFall linear forwards;
    filter: drop-shadow(0 0 8px rgba(255,80,160,0.9));
    user-select: none;
  }

  @keyframes heartFall {
    0%   { transform: translateY(0) rotate(-15deg) scale(0.5); opacity: 0; }
    10%  { opacity: 1; transform: translateY(5vh) rotate(10deg) scale(1.1); }
    50%  { transform: translateY(50vh) rotate(-8deg) scale(1); opacity: 1; }
    100% { transform: translateY(110vh) rotate(20deg) scale(0.7); opacity: 0; }
  }

  .easter-banner {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%) scale(0);
    z-index: 210;
    background: rgba(8,4,18,0.94);
    border: 2px solid #ff50a0;
    padding: 20px 36px;
    text-align: center;
    pointer-events: none;
    animation: bannerPop 2.8s ease forwards;
    box-shadow: 0 0 40px rgba(255,80,160,0.5), inset 0 0 20px rgba(255,80,160,0.08);
    font-family: 'Orbitron', sans-serif;
  }

  .easter-banner .banner-title {
    font-size: clamp(10px, 2vw, 15px);
    font-weight: 900;
    color: #ff50a0;
    text-shadow: 0 0 14px #ff50a0;
    letter-spacing: 3px;
    line-height: 2;
  }

  .easter-banner .banner-sub {
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    color: rgba(255,160,210,0.7);
    margin-top: 6px;
    letter-spacing: 2px;
  }

  @keyframes bannerPop {
    0%   { transform: translate(-50%,-50%) scale(0); opacity: 0; }
    15%  { transform: translate(-50%,-50%) scale(1.08); opacity: 1; }
    25%  { transform: translate(-50%,-50%) scale(1); opacity: 1; }
    72%  { transform: translate(-50%,-50%) scale(1); opacity: 1; }
    100% { transform: translate(-50%,-50%) scale(0.8); opacity: 0; }
  }
</style>
</head>
<body>
<div id="heartContainer"></div>
<div class="layout">
  <!-- LEFT PANEL -->
  <div class="side-panel left">
    <div>
      <div class="panel-label">SCORE</div>
      <div class="panel-value" id="scoreVal">0</div>
    </div>
    <div>
      <div class="panel-label">BEST</div>
      <div class="panel-value magenta" id="bestVal">0</div>
    </div>
    <div>
      <div class="panel-label">LINES</div>
      <div class="panel-value" id="linesVal">0</div>
    </div>
    <div>
      <div class="panel-label">LEVEL</div>
      <div class="panel-value" id="levelVal">1</div>
    </div>
  </div>

  <!-- CENTER -->
  <div class="game-wrapper">
    <div class="title-bar"><h1>TETRIS</h1></div>
    <canvas id="gameCanvas" width="300" height="600"></canvas>
    <div id="overlay">
      <div class="overlay-title" id="overlayTitle">TETRIS</div>
      <div class="overlay-sub" id="overlaySub">
        ← → &nbsp; MOVER<br>
        ↑ &nbsp;&nbsp;&nbsp;&nbsp;&nbsp; ROTAR<br>
        ↓ &nbsp;&nbsp;&nbsp;&nbsp;&nbsp; BAJAR<br>
        ESPACIO &nbsp; CAÍDA RÁPIDA<br>
        P &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; PAUSA
      </div>
      <button class="btn" id="startBtn">▶ INICIAR</button>
    </div>

    <!-- Mobile controls -->
    <div class="mobile-controls">
      <div class="ctrl-row">
        <div class="ctrl-btn" id="rotBtn">↻</div>
      </div>
      <div class="ctrl-row">
        <div class="ctrl-btn" id="leftBtn">◀</div>
        <div class="ctrl-btn" id="downBtn">▼</div>
        <div class="ctrl-btn" id="rightBtn">▶</div>
      </div>
      <div class="ctrl-row">
        <div class="ctrl-btn" id="dropBtn" style="width:100px;font-size:11px;">DROP</div>
      </div>
    </div>
  </div>

  <!-- RIGHT PANEL -->
  <div class="side-panel right">
    <div>
      <div class="panel-label">NEXT</div>
      <canvas id="nextCanvas" width="100" height="100"></canvas>
    </div>
    <div style="margin-top: auto;">
      <div class="panel-label" style="margin-bottom:8px;">CONTROLS</div>
      <div style="font-size:9px; line-height:2; color:rgba(80,200,255,0.4);">
        ← → MOVE<br>
        ↑ ROTATE<br>
        ↓ SOFT DROP<br>
        SPC HARD DROP<br>
        P PAUSE
      </div>
    </div>
  </div>
</div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const nextCanvas = document.getElementById('nextCanvas');
const nctx = nextCanvas.getContext('2d');
const overlay = document.getElementById('overlay');
const overlayTitle = document.getElementById('overlayTitle');
const overlaySub = document.getElementById('overlaySub');
const startBtn = document.getElementById('startBtn');

const COLS = 10, ROWS = 20, CELL = 30;

// Tetromino shapes
const PIECES = [
  { shape: [[1,1,1,1]], color: '#00eeff', shadow: '#00eeff' },           // I
  { shape: [[1,1],[1,1]], color: '#ffe600', shadow: '#ffe600' },          // O
  { shape: [[0,1,0],[1,1,1]], color: '#cc44ff', shadow: '#cc44ff' },      // T
  { shape: [[1,0,0],[1,1,1]], color: '#ff8800', shadow: '#ff8800' },      // J
  { shape: [[0,0,1],[1,1,1]], color: '#50c8ff', shadow: '#50c8ff' },      // L
  { shape: [[0,1,1],[1,1,0]], color: '#39ff6e', shadow: '#39ff6e' },      // S
  { shape: [[1,1,0],[0,1,1]], color: '#ff2d78', shadow: '#ff2d78' },      // Z
];

let board, current, currentX, currentY, next;
let score, best, lines, level;
let dropTimer, running, paused, gameOver;
let dropInterval;
let animFrame;

function createBoard() {
  return Array.from({length: ROWS}, () => Array(COLS).fill(0));
}

function randomPiece() {
  const p = PIECES[Math.floor(Math.random() * PIECES.length)];
  return { shape: p.shape.map(r => [...r]), color: p.color };
}

function init() {
  board = createBoard();
  next = randomPiece();
  score = 0; lines = 0; level = 1;
  gameOver = false; paused = false;
  heartTriggered = new Set();
  spawnPiece();
  updateHUD();
}

function spawnPiece() {
  current = next;
  next = randomPiece();
  currentX = Math.floor((COLS - current.shape[0].length) / 2);
  currentY = 0;
  if (collides(current.shape, currentX, currentY)) {
    endGame();
  }
  drawNext();
}

function collides(shape, ox, oy) {
  for (let r = 0; r < shape.length; r++)
    for (let c = 0; c < shape[r].length; c++)
      if (shape[r][c]) {
        const nx = ox + c, ny = oy + r;
        if (nx < 0 || nx >= COLS || ny >= ROWS) return true;
        if (ny >= 0 && board[ny][nx]) return true;
      }
  return false;
}

function rotate(shape) {
  const rows = shape.length, cols = shape[0].length;
  return Array.from({length: cols}, (_, c) =>
    Array.from({length: rows}, (_, r) => shape[rows - 1 - r][c])
  );
}

function lock() {
  current.shape.forEach((row, r) =>
    row.forEach((v, c) => {
      if (v && currentY + r >= 0)
        board[currentY + r][currentX + c] = current.color;
    })
  );
  clearLines();
  spawnPiece();
}

function clearLines() {
  let cleared = 0;
  for (let r = ROWS - 1; r >= 0; r--) {
    if (board[r].every(c => c !== 0)) {
      board.splice(r, 1);
      board.unshift(Array(COLS).fill(0));
      cleared++;
      r++; // re-check same row index
    }
  }
  if (cleared) {
    const pts = [0, 100, 300, 500, 800][cleared] * level;
    score += pts;
    lines += cleared;
    level = Math.floor(lines / 10) + 1;
    dropInterval = getInterval();
    if (score > best) best = score;
    checkHeartEasterEgg(score);
    updateHUD();
    // Flash effect
    flashLines();
  }
}

function flashLines() {
  canvas.style.animation = 'none';
  canvas.style.filter = 'brightness(2)';
  setTimeout(() => { canvas.style.filter = 'brightness(1)'; }, 80);
}

function getInterval() {
  return Math.max(80, 1000 - (level - 1) * 80);
}

function hardDrop() {
  while (!collides(current.shape, currentX, currentY + 1)) currentY++;
  lock();
}

function moveDown() {
  if (!collides(current.shape, currentX, currentY + 1)) {
    currentY++;
  } else {
    lock();
  }
}

// Ghost piece
function getGhostY() {
  let gy = currentY;
  while (!collides(current.shape, currentX, gy + 1)) gy++;
  return gy;
}

function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // Grid lines
  ctx.strokeStyle = 'rgba(80,200,255,0.05)';
  ctx.lineWidth = 0.5;
  for (let c = 0; c <= COLS; c++) {
    ctx.beginPath(); ctx.moveTo(c*CELL,0); ctx.lineTo(c*CELL,canvas.height); ctx.stroke();
  }
  for (let r = 0; r <= ROWS; r++) {
    ctx.beginPath(); ctx.moveTo(0,r*CELL); ctx.lineTo(canvas.width,r*CELL); ctx.stroke();
  }

  // Board
  board.forEach((row, r) =>
    row.forEach((color, c) => {
      if (color) drawCell(ctx, c, r, color);
    })
  );

  // Ghost
  const gy = getGhostY();
  if (gy !== currentY) {
    current.shape.forEach((row, r) =>
      row.forEach((v, c) => {
        if (v) {
          ctx.save();
          ctx.globalAlpha = 0.18;
          drawCell(ctx, currentX + c, gy + r, current.color);
          ctx.restore();
        }
      })
    );
  }

  // Current piece
  current.shape.forEach((row, r) =>
    row.forEach((v, c) => {
      if (v) drawCell(ctx, currentX + c, currentY + r, current.color);
    })
  );
}

function drawCell(c, x, y, color) {
  const px = x * CELL, py = y * CELL;
  const s = CELL - 1;

  c.save();
  c.shadowBlur = 14;
  c.shadowColor = color;
  c.fillStyle = color;
  c.fillRect(px + 1, py + 1, s - 1, s - 1);

  // Inner highlight
  c.shadowBlur = 0;
  c.fillStyle = 'rgba(255,255,255,0.25)';
  c.fillRect(px + 2, py + 2, s - 4, 4);
  c.fillRect(px + 2, py + 2, 4, s - 4);

  // Dark edge
  c.fillStyle = 'rgba(0,0,0,0.35)';
  c.fillRect(px + s - 2, py + 2, 2, s - 2);
  c.fillRect(px + 2, py + s - 2, s - 2, 2);

  c.restore();
}

function drawNext() {
  nctx.clearRect(0, 0, nextCanvas.width, nextCanvas.height);
  const shape = next.shape;
  const cellSize = 20;
  const offX = Math.floor((nextCanvas.width - shape[0].length * cellSize) / 2);
  const offY = Math.floor((nextCanvas.height - shape.length * cellSize) / 2);
  shape.forEach((row, r) =>
    row.forEach((v, c) => {
      if (v) {
        nctx.save();
        nctx.shadowBlur = 10;
        nctx.shadowColor = next.color;
        nctx.fillStyle = next.color;
        nctx.fillRect(offX + c*cellSize + 1, offY + r*cellSize + 1, cellSize-2, cellSize-2);
        nctx.restore();
      }
    })
  );
}

function updateHUD() {
  document.getElementById('scoreVal').textContent = score;
  document.getElementById('bestVal').textContent = best;
  document.getElementById('linesVal').textContent = lines;
  document.getElementById('levelVal').textContent = level;
}

function gameLoop() {
  if (!paused && !gameOver) {
    moveDown();
    draw();
  }
  if (!gameOver) {
    dropTimer = setTimeout(gameLoop, dropInterval);
  }
}

function start() {
  clearTimeout(dropTimer);
  cancelAnimationFrame(animFrame);
  init();
  dropInterval = getInterval();
  overlay.classList.add('hidden');
  running = true;
  gameLoop();
}

function endGame() {
  gameOver = true;
  running = false;
  clearTimeout(dropTimer);
  if (score > best) best = score;
  updateHUD();

  // Death animation - fill red then show overlay
  let row = ROWS - 1;
  const deathAnim = setInterval(() => {
    if (row < 0) {
      clearInterval(deathAnim);
      overlayTitle.textContent = '⚠ GAME OVER';
      overlaySub.innerHTML = `SCORE: ${score}<br>LINES: ${lines}<br>LEVEL: ${level}`;
      startBtn.textContent = '↩ REINICIAR';
      overlay.classList.remove('hidden');
      return;
    }
    for (let c = 0; c < COLS; c++) board[row][c] = '#ff2d78';
    draw();
    row--;
  }, 40);
}

// Keyboard
document.addEventListener('keydown', e => {
  if (!running || gameOver) return;
  switch(e.key) {
    case 'ArrowLeft': case 'a': case 'A':
      if (!collides(current.shape, currentX - 1, currentY)) { currentX--; draw(); }
      e.preventDefault(); break;
    case 'ArrowRight': case 'd': case 'D':
      if (!collides(current.shape, currentX + 1, currentY)) { currentX++; draw(); }
      e.preventDefault(); break;
    case 'ArrowDown': case 's': case 'S':
      moveDown(); draw();
      e.preventDefault(); break;
    case 'ArrowUp': case 'w': case 'W': {
      const rotated = rotate(current.shape);
      if (!collides(rotated, currentX, currentY)) { current.shape = rotated; draw(); }
      else if (!collides(rotated, currentX - 1, currentY)) { currentX--; current.shape = rotated; draw(); }
      else if (!collides(rotated, currentX + 1, currentY)) { currentX++; current.shape = rotated; draw(); }
      e.preventDefault(); break;
    }
    case ' ':
      hardDrop(); draw();
      e.preventDefault(); break;
    case 'p': case 'P':
      if (!gameOver) {
        paused = !paused;
        if (paused) {
          overlayTitle.textContent = '⏸ PAUSA';
          overlaySub.innerHTML = 'Presiona P para continuar';
          startBtn.textContent = '▶ CONTINUAR';
          overlay.classList.remove('hidden');
        } else {
          overlay.classList.add('hidden');
        }
      }
      break;
  }
});

startBtn.addEventListener('click', () => {
  if (paused) {
    paused = false;
    overlay.classList.add('hidden');
  } else {
    start();
  }
});

// Mobile controls
document.getElementById('leftBtn').addEventListener('click', () => {
  if (running && !paused && !gameOver && !collides(current.shape, currentX-1, currentY)) { currentX--; draw(); }
});
document.getElementById('rightBtn').addEventListener('click', () => {
  if (running && !paused && !gameOver && !collides(current.shape, currentX+1, currentY)) { currentX++; draw(); }
});
document.getElementById('downBtn').addEventListener('click', () => {
  if (running && !paused && !gameOver) { moveDown(); draw(); }
});
document.getElementById('rotBtn').addEventListener('click', () => {
  if (!running || paused || gameOver) return;
  const rotated = rotate(current.shape);
  if (!collides(rotated, currentX, currentY)) { current.shape = rotated; draw(); }
  else if (!collides(rotated, currentX - 1, currentY)) { currentX--; current.shape = rotated; draw(); }
  else if (!collides(rotated, currentX + 1, currentY)) { currentX++; current.shape = rotated; draw(); }
});
document.getElementById('dropBtn').addEventListener('click', () => {
  if (running && !paused && !gameOver) { hardDrop(); draw(); }
});

// ── HEART EASTER EGG ──
const HEART_MILESTONES = [
  { score: 500,  emoji: '💖', title: '¡AMOR A PRIMERA LÍNEA!',  sub: '500 PTS • TETRIS ROMÁNTICO' },
  { score: 1000, emoji: '💗', title: '¡CORAZÓN DE TETRIS!',     sub: '1000 PTS • COMBO AMOROSO' },
  { score: 3000, emoji: '💘', title: '¡ENAMORADO DEL TABLERO!', sub: '3000 PTS • MAESTRO DE BLOQUES' },
  { score: 6000, emoji: '💝', title: '¡AMOR INCONDICIONAL!',    sub: '6000 PTS • DIOS DEL TETRIS' },
];
let heartTriggered = new Set();

function checkHeartEasterEgg(newScore) {
  for (const m of HEART_MILESTONES) {
    if (newScore >= m.score && !heartTriggered.has(m.score)) {
      heartTriggered.add(m.score);
      triggerHearts(m);
    }
  }
}

function triggerHearts(milestone) {
  const container = document.getElementById('heartContainer');
  const emojis = ['💖','💗','💓','💕','💞','💝','❤️','🩷','💟'];
  const count = 35;

  for (let i = 0; i < count; i++) {
    setTimeout(() => {
      const el = document.createElement('div');
      el.className = 'heart-particle';
      el.textContent = emojis[Math.floor(Math.random() * emojis.length)];
      el.style.left = Math.random() * 100 + 'vw';
      el.style.fontSize = (16 + Math.random() * 26) + 'px';
      const dur = 2.4 + Math.random() * 2.2;
      el.style.animationDuration = dur + 's';
      el.style.animationDelay = (Math.random() * 0.6) + 's';
      container.appendChild(el);
      el.addEventListener('animationend', () => el.remove());
    }, i * 55);
  }

  // Pink board flash
  canvas.style.transition = 'filter 0.1s';
  canvas.style.filter = 'brightness(1.4) hue-rotate(280deg)';
  setTimeout(() => {
    canvas.style.filter = 'brightness(1) hue-rotate(0deg)';
  }, 300);

  // Banner
  const banner = document.createElement('div');
  banner.className = 'easter-banner';
  banner.innerHTML = `
    <div class="banner-title">${milestone.emoji} ${milestone.title} ${milestone.emoji}</div>
    <div class="banner-sub">${milestone.sub}</div>
  `;
  document.body.appendChild(banner);
  banner.addEventListener('animationend', () => banner.remove());
}

best = 0;
heartTriggered = new Set();
</script>
