<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PRESS START TO FORGET</title>

<style>
body {
    background: black;
    color: #33ff33;
    font-family: "Courier New", monospace;
    margin: 0;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
}

#container {
    width: 95%;
    max-width: 700px;
}

#game {
    border: 4px solid #33ff33;
    padding: 20px;
    min-height: 300px;
    max-height: 65vh;
    overflow-y: auto;
    white-space: pre-wrap;
    text-shadow: 0 0 5px #33ff33;
    font-size: clamp(14px, 2.5vw, 18px);
}

.blink {
    animation: blink 1s infinite;
}

@keyframes blink {
    50% { opacity: 0; }
}

#controls {
    margin-top: 15px;
    display: flex;
    gap: 10px;
    justify-content: center;
    flex-wrap: wrap;
}

button {
    background: black;
    color: #33ff33;
    border: 1px solid #33ff33;
    padding: 10px 20px;
    font-family: inherit;
    font-size: 16px;
    cursor: pointer;
    flex: 1;
    min-width: 80px;
}

button:active {
    background: #33ff33;
    color: black;
}
</style>
</head>

<body>

<div id="container">
    <div id="game"></div>

    <div id="controls">
        <button onclick="next()">ENTER</button>
        <button onclick="choose(1)">1</button>
        <button onclick="choose(2)">2</button>
    </div>
</div>

<script>
const game = document.getElementById("game");
let state = 0;

const scenes = [
`PRESS START TO FORGET

Un juego sobre el tiempo.
Y lo que no hiciste con él.

Pulsa ENTER.`,

`DÍA 1

La conoces.
Ríe.
Te mira un segundo más.

1 - Decir algo valiente
2 - No arruinarlo`,

`Sonríes.
No dices nada.

Pulsa ENTER.`,

`DÍA 18

Ya hay bromas internas.
Ya hay canciones compartidas.
Ya hay costumbre.

Pulsa ENTER.`,

`DÍA 730

Dos años.

Te llega un mensaje inesperado.

"Hola… ¿cómo estás?"

1 - Responder frío
2 - Ser honesto`,

`Has aprendido algo.

Pero el juego no devuelve años.

GAME OVER

Pulsa ENTER para reiniciar.`
];

function render(text) {
    game.innerHTML = text + "\n\n<span class='blink'>_</span>";
    game.scrollTop = game.scrollHeight;
}

function next() {
    if (state < scenes.length - 1) {
        state++;
    } else {
        state = 0;
    }
    render(scenes[state]);
}

function choose(option) {
    next();
}

document.addEventListener("keydown", (e) => {
    if (e.key === "Enter") next();
    if (e.key === "1") choose(1);
    if (e.key === "2") choose(2);
});

render(scenes[state]);
</script>

</body>
</html>
