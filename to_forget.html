<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PRESS START TO FORGET</title>

<style>
body {
    background: black;
    color: #33ff33;
    font-family: "Courier New", monospace;
    margin: 0;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
}

#container {
    width: 95%;
    max-width: 700px;
}

#game {
    border: 4px solid #33ff33;
    padding: 20px;
    min-height: 300px;
    max-height: 65vh;
    overflow-y: auto;
    white-space: pre-wrap;
    text-shadow: 0 0 5px #33ff33;
    font-size: clamp(14px, 2.5vw, 18px);
}

.blink {
    animation: blink 1s infinite;
}

@keyframes blink {
    50% { opacity: 0; }
}

#controls {
    margin-top: 15px;
    display: flex;
    gap: 10px;
    justify-content: center;
    flex-wrap: wrap;
}

button {
    background: black;
    color: #33ff33;
    border: 1px solid #33ff33;
    padding: 10px 20px;
    font-family: inherit;
    font-size: 16px;
    cursor: pointer;
    flex: 1;
    min-width: 80px;
}

button:active {
    background: #33ff33;
    color: black;
}
</style>
</head>

<body>

<div id="container">
    <div id="game"></div>

    <div id="controls">
        <button onclick="next()">ENTER</button>
        <button onclick="choose(1)">1</button>
        <button onclick="choose(2)">2</button>
    </div>
</div>

<script>
const game = document.getElementById("game");
let state = 0;

const scenes = [

`PRESS START TO FORGET

Un juego sobre el tiempo.
Y lo que no hiciste con él.

Pulsa ENTER.`,

`DÍA 1

La conoces.
Ríe.
Te mira un segundo más.

1 - Decir algo valiente
2 - No arruinarlo`,

`Sonríes.
No dices nada.

Pulsa ENTER.`,

`DÍA 18

Ya hay bromas internas.
Ya hay canciones compartidas.
Ya hay costumbre.

Pulsa ENTER.`,

`DÍA 36

Están bajo luces de ciudad.
Hay un silencio que pide una confesión.

Tu corazón late fuerte.

1 - Decirlo
2 - Esperar el momento perfecto`,

`Esperas.

Siempre hay un momento mejor.
Siempre mañana.

Pulsa ENTER.`,

`DÍA 42

Un silencio incómodo.
Un casi.
Un "¿ibas a decir algo?"

1 - Sí
2 - No`,

`DÍA 67

Te dice:
"Me gusta cuando hablo contigo."

Tu cerebro dice:
"No te ilusiones."

Pulsa ENTER.`,

`Dices que no.
Siempre hay mañana.

Pulsa ENTER.`,

`DÍA 73

Te escribe primero.
Te pregunta si estás bien.
Te manda una foto sin motivo.

Pulsa ENTER.`,

`DÍA 104

Ha conocido a alguien.

Tu estómago cae.
Tu orgullo habla:
"Está bien."

Pulsa ENTER.`,

`DÍA 150

Hablas menos.
Piensas más.

Pulsa ENTER.`,

`DÍA 200

Ya no compartís canciones.
Solo recuerdos de ellas.

Pulsa ENTER.`,

`DÍA 365

Un año.
La ves feliz.
Y tú… sigues pensando.

Pulsa ENTER.`,

`DÍA 540

Ya casi no habláis.
Pero sigues revisando su perfil.

Pulsa ENTER.`,

`DÍA 730

Dos años.

Te llega un mensaje inesperado.

"Hola… ¿cómo estás?"

Tu corazón reinicia.

1 - Responder frío
2 - Ser honesto`,

`Respondes.
La conversación fluye.
Como antes.
Pero diferente.

Pulsa ENTER.`,

`DÍA 742

Quedáis para tomar algo.
Las miradas son las mismas.
El tiempo no.

Pulsa ENTER.`,

`DÍA 745

Te dice:
"Siempre pensé que pudo haber algo."

El universo te da otra oportunidad.

1 - Decir lo que siempre sentiste
2 - Protegerte`,

`Lo dices.
Todo.
Sin filtro.
Sin miedo.
Dos años tarde.

Silencio.

Pulsa ENTER.`,

`Ella sonríe.
Pero es una sonrisa distinta.

"Ahora ya no estoy en ese lugar."

No era rechazo.
Era timing.

Pulsa ENTER.`,

`Has aprendido algo.

Pero el juego no devuelve años.

GAME OVER

Pulsa ENTER para reiniciar.`

];

function render(text) {
    game.innerHTML = text + "\n\n<span class='blink'>_</span>";
    game.scrollTop = game.scrollHeight;
}

function next() {
    if (state < scenes.length - 1) {
        state++;
    } else {
        state = 0;
    }
    render(scenes[state]);
}

function choose(option) {
    next();
}

document.addEventListener("keydown", (e) => {
    if (e.key === "Enter") next();
    if (e.key === "1") choose(1);
    if (e.key === "2") choose(2);
});

render(scenes[state]);
</script>

</body>
</html>
