<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ASTEROIDS</title>
<link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@200;400;700&family=Space+Mono&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#03030a;--ice:#a8c4e0;--dim:#3a4a5a;--red:#cc3344;}
body{
  background:var(--bg);font-family:'Space Mono',monospace;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  min-height:100vh;overflow:hidden;color:var(--ice);
}
body::before{
  content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background:radial-gradient(ellipse 80% 80% at 50% 50%,rgba(15,20,40,.6) 0%,#03030a 70%);
}
.wrap{position:relative;z-index:1;display:flex;flex-direction:column;align-items:center;gap:10px;}
h1{
  font-family:'Exo 2',sans-serif;font-weight:200;
  font-size:clamp(18px,4vw,34px);letter-spacing:14px;
  color:var(--ice);text-shadow:0 0 20px rgba(168,196,224,.3);
  text-transform:uppercase;
}
.tagline{font-size:10px;letter-spacing:5px;color:var(--dim);margin-top:-6px;}
.hud{display:flex;gap:32px;font-size:11px;letter-spacing:3px;color:var(--dim);}
.hud span{color:var(--ice);}
.cw{position:relative;}
canvas{display:block;border:1px solid rgba(168,196,224,.1);background:#03030a;
  box-shadow:0 0 40px rgba(0,0,0,.9);}
#ov{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;
    justify-content:center;gap:18px;background:rgba(3,3,10,.9);transition:opacity .3s;}
#ov.hide{opacity:0;pointer-events:none;}
.ot{font-family:'Exo 2',sans-serif;font-weight:200;font-size:clamp(13px,3vw,20px);
    color:var(--ice);text-align:center;letter-spacing:8px;line-height:2;text-transform:uppercase;}
.os{font-size:11px;color:var(--dim);text-align:center;line-height:2.4;letter-spacing:2px;}
.btn{font-family:'Space Mono',monospace;font-size:11px;letter-spacing:4px;
     padding:10px 28px;background:transparent;color:var(--ice);
     border:1px solid rgba(168,196,224,.3);cursor:pointer;transition:all .2s;text-transform:uppercase;}
.btn:hover{background:rgba(168,196,224,.06);border-color:var(--ice);}
.note{font-size:9px;letter-spacing:3px;color:rgba(168,196,224,.2);}
/* Heartbreak */
#hc{position:fixed;inset:0;pointer-events:none;z-index:200;overflow:hidden;}
.hp{position:absolute;top:-60px;animation:hfall linear forwards;user-select:none;}
@keyframes hfall{0%{transform:translateY(0) scale(.5);opacity:0;}10%{opacity:.8;}60%{opacity:.6;}100%{transform:translateY(110vh) scale(.6);opacity:0;}}
.eb{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%) scale(0);z-index:210;
    background:rgba(3,3,10,.98);border:1px solid rgba(168,196,224,.2);
    padding:22px 38px;text-align:center;pointer-events:none;animation:bpop 3s ease forwards;
    font-family:'Exo 2',sans-serif;font-weight:200;}
.eb .t{font-size:clamp(10px,2vw,14px);color:var(--ice);letter-spacing:6px;line-height:2.2;text-transform:uppercase;}
.eb .s{font-size:11px;color:var(--dim);margin-top:6px;letter-spacing:2px;font-style:italic;}
@keyframes bpop{0%{transform:translate(-50%,-50%) scale(0);opacity:0;}12%{transform:translate(-50%,-50%) scale(1.04);opacity:1;}20%,78%{transform:translate(-50%,-50%) scale(1);opacity:1;}100%{transform:translate(-50%,-50%) scale(.9);opacity:0;}}
</style>
</head>
<body>
<div id="hc"></div>
<div class="wrap">
  <h1>ASTEROIDS</h1>
  <div class="tagline">— solo en el universo —</div>
  <div class="hud">
    <div>SCORE: <span id="sc">0</span></div>
    <div>BEST: <span id="bs">0</span></div>
    <div>VIDAS: <span id="lv">♦♦♦♦♦</span></div>
  </div>
  <div class="cw">
    <canvas id="c" width="520" height="480"></canvas>
    <div id="ov">
      <div class="ot" id="ot">ASTEROIDS</div>
      <div class="os" id="os">← → GIRAR &nbsp;·&nbsp; ↑ IMPULSO<br>ESPACIO DISPARAR &nbsp;·&nbsp; P PAUSA</div>
      <button class="btn" id="sb">▶ INICIAR</button>
    </div>
  </div>
  <div class="note">destruye los fragmentos · sobrevive · olvida</div>
</div>
<script>
const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');
const ov=document.getElementById('ov');
const ot=document.getElementById('ot');
const os=document.getElementById('os');
const sb=document.getElementById('sb');
const W=canvas.width,H=canvas.height;

let ship,bullets,asteroids,particles;
let score,best=0,lives,wave,running=false,paused=false,gameOver=false;
let heartDone=new Set(),raf=0,tick=0,invTimer=0;

const MILESTONES=[
  {s:20,  e:'🌫️', t:'PRIMEROS FRAGMENTOS',        b:'"Rompiste algo. Como siempre."'},
  {s:50,  e:'💔', t:'FRAGMENTOS DEL RECUERDO',    b:'"Lo rompiste en pedazos. Como a ti."'},
  {s:100, e:'🌑', t:'OSCURIDAD TOTAL',             b:'"No hay oxígeno aquí. Tampoco lo había allí."'},
  {s:200, e:'💧', t:'LLOVIENDO EN EL VACÍO',       b:'"Hasta en el espacio se puede llorar."'},
  {s:350, e:'🩶', t:'DERIVA INFINITA',             b:'"Sigues moviéndote. No sabes hacia dónde."'},
  {s:550, e:'🌠', t:'ESTRELLA FUGAZ',              b:'"Pediste un deseo. No se cumplió."'},
  {s:700, e:'☄️', t:'IMPACTO INEVITABLE',          b:'"Sabías que llegaría. Lo esperabas."'},
  {s:1000,e:'🪐', t:'ÓRBITA ROTA',                 b:'"Ya no giras alrededor de nadie."'},
  {s:1200,e:'🕳️', t:'EL AGUJERO NEGRO',            b:'"Todo lo que alguna vez fuiste, absorbido."'},
  {s:1800,e:'✨', t:'SUPERNOVA',                   b:'"Explotas para volver a existir."'},
];

const STARS=Array.from({length:120},()=>({
  x:Math.random()*W,y:Math.random()*H,
  r:Math.random()*1.2,a:0.2+Math.random()*.6
}));

function makeShip(){
  return {x:W/2,y:H/2,angle:-Math.PI/2,vx:0,vy:0,thrusting:false,dead:false};
}

function makeAsteroid(x,y,size){
  const ang=Math.random()*Math.PI*2;
  const spd=(0.7+Math.random()*0.9)*(3-size)*.6;
  const pts=[];
  const n=7+Math.floor(Math.random()*5);
  for(let i=0;i<n;i++){
    const a=(i/n)*Math.PI*2;
    const r=size*18*(0.7+Math.random()*.5);
    pts.push({x:Math.cos(a)*r,y:Math.sin(a)*r});
  }
  return {x,y,vx:Math.cos(ang)*spd,vy:Math.sin(ang)*spd,size,pts,angle:0,spin:(Math.random()-.5)*.03};
}

function spawnWave(){
  const count=2+wave;
  asteroids=[];
  for(let i=0;i<count;i++){
    let x,y;
    do{ x=Math.random()*W; y=Math.random()*H; }
    while(Math.hypot(x-ship.x,y-ship.y)<120);
    asteroids.push(makeAsteroid(x,y,3));
  }
}

function initGame(){
  score=0;lives=5;wave=1;heartDone=new Set();gameOver=false;paused=false;tick=0;invTimer=120;
  ship=makeShip();bullets=[];particles=[];
  spawnWave();updateHUD();
}

function startGame(){
  initGame();ov.classList.add('hide');running=true;
  cancelAnimationFrame(raf);loop();
}

const keys={};
document.addEventListener('keydown',e=>{
  keys[e.key]=true;
  if(e.key===' '){shoot();e.preventDefault();}
  if(e.key==='p'||e.key==='P') togglePause();
  if(['ArrowLeft','ArrowRight','ArrowUp'].includes(e.key)) e.preventDefault();
});
document.addEventListener('keyup',e=>{keys[e.key]=false;});

function shoot(){
  if(!running||paused||gameOver||ship.dead) return;
  if(bullets.length>=5) return;
  bullets.push({
    x:ship.x+Math.cos(ship.angle)*16,
    y:ship.y+Math.sin(ship.angle)*16,
    vx:Math.cos(ship.angle)*9+ship.vx,
    vy:Math.sin(ship.angle)*9+ship.vy,
    life:60
  });
}

function togglePause(){
  if(!running||gameOver) return;
  paused=!paused;
  if(paused){ot.textContent='— DERIVA —';os.innerHTML='P para continuar';sb.textContent='▶ CONTINUAR';ov.classList.remove('hide');}
  else ov.classList.add('hide');
}

function loop(){
  if(!running) return;
  if(!paused&&!gameOver) update();
  draw();
  raf=requestAnimationFrame(loop);
}

function wrap(e){
  if(e.x<0)e.x=W;if(e.x>W)e.x=0;
  if(e.y<0)e.y=H;if(e.y>H)e.y=0;
}

function update(){
  tick++;
  if(invTimer>0) invTimer--;

  if(!ship.dead){
    if(keys['ArrowLeft']||keys['a']||keys['A']) ship.angle-=0.055;
    if(keys['ArrowRight']||keys['d']||keys['D']) ship.angle+=0.055;
    ship.thrusting=keys['ArrowUp']||keys['w']||keys['W'];
    if(ship.thrusting){
      ship.vx+=Math.cos(ship.angle)*.18;
      ship.vy+=Math.sin(ship.angle)*.18;
    }
    ship.vx*=.98;ship.vy*=.98;
    ship.x+=ship.vx;ship.y+=ship.vy;
    wrap(ship);
  }

  // Bullets
  for(let i=bullets.length-1;i>=0;i--){
    const b=bullets[i];
    b.x+=b.vx;b.y+=b.vy;b.life--;
    wrap(b);
    if(b.life<=0){bullets.splice(i,1);continue;}

    // Hit asteroid
    let hit=false;
    for(let j=asteroids.length-1;j>=0;j--){
      const a=asteroids[j];
      if(Math.hypot(b.x-a.x,b.y-a.y)<a.size*18*.7){
        // Explode
        spawnParticles(a.x,a.y,8);
        if(a.size>1){
          asteroids.push(makeAsteroid(a.x,a.y,a.size-1));
          asteroids.push(makeAsteroid(a.x,a.y,a.size-1));
        }
        asteroids.splice(j,1);
        bullets.splice(i,1);
        const pts=[20,50,100][3-a.size-1+2]||20;
        score+=pts;if(score>best)best=score;
        checkMilestone(score);updateHUD();
        hit=true;break;
      }
    }
    if(hit) continue;
  }

  // Asteroids
  asteroids.forEach(a=>{
    a.x+=a.vx;a.y+=a.vy;a.angle+=a.spin;wrap(a);

    // Hit ship
    if(!ship.dead&&invTimer<=0&&Math.hypot(a.x-ship.x,a.y-ship.y)<a.size*18*.55+10){
      spawnParticles(ship.x,ship.y,14);
      ship.dead=true;lives--;updateHUD();
      if(lives<=0){ setTimeout(endGame,800); }
      else { setTimeout(()=>{ ship=makeShip();invTimer=180; },900); }
    }
  });

  // Particles
  for(let i=particles.length-1;i>=0;i--){
    const p=particles[i];
    p.x+=p.vx;p.y+=p.vy;p.life-=.03;p.vx*=.97;p.vy*=.97;
    if(p.life<=0) particles.splice(i,1);
  }

  if(asteroids.length===0){wave++;spawnWave();}
}

function spawnParticles(x,y,n){
  for(let i=0;i<n;i++){
    const ang=Math.random()*Math.PI*2;
    const spd=.5+Math.random()*3;
    particles.push({x,y,vx:Math.cos(ang)*spd,vy:Math.sin(ang)*spd,life:1});
  }
}

function draw(){
  ctx.fillStyle='#03030a';ctx.fillRect(0,0,W,H);

  // Stars
  STARS.forEach(s=>{
    ctx.globalAlpha=s.a*(0.7+0.3*Math.sin(tick*.01+s.x));
    ctx.fillStyle='#a8c4e0';
    ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);ctx.fill();
  });
  ctx.globalAlpha=1;

  // Asteroids
  asteroids.forEach(a=>{
    ctx.save();ctx.translate(a.x,a.y);ctx.rotate(a.angle);
    ctx.strokeStyle='rgba(168,196,224,.6)';ctx.lineWidth=1.5;
    ctx.shadowBlur=6;ctx.shadowColor='rgba(168,196,224,.2)';
    ctx.beginPath();
    a.pts.forEach((p,i)=>i===0?ctx.moveTo(p.x,p.y):ctx.lineTo(p.x,p.y));
    ctx.closePath();ctx.stroke();
    ctx.restore();
  });

  // Particles
  particles.forEach(p=>{
    ctx.save();ctx.globalAlpha=p.life;
    ctx.fillStyle='#a8c4e0';ctx.shadowBlur=4;ctx.shadowColor='#a8c4e0';
    ctx.fillRect(p.x-1,p.y-1,2,2);
    ctx.restore();
  });

  // Bullets
  bullets.forEach(b=>{
    ctx.save();ctx.shadowBlur=10;ctx.shadowColor='#a8c4e0';
    ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(b.x,b.y,2.5,0,Math.PI*2);ctx.fill();
    ctx.restore();
  });

  // Ship
  if(!ship.dead&&(invTimer<=0||tick%6<3)){
    ctx.save();ctx.translate(ship.x,ship.y);ctx.rotate(ship.angle);
    ctx.shadowBlur=14;ctx.shadowColor='rgba(168,196,224,.6)';
    ctx.strokeStyle='#a8c4e0';ctx.lineWidth=1.5;
    ctx.beginPath();ctx.moveTo(16,0);ctx.lineTo(-10,10);ctx.lineTo(-6,0);ctx.lineTo(-10,-10);ctx.closePath();
    ctx.stroke();
    if(ship.thrusting&&tick%4<2){
      ctx.strokeStyle='rgba(168,196,224,.4)';ctx.lineWidth=1;
      ctx.beginPath();ctx.moveTo(-6,0);ctx.lineTo(-18+Math.random()*6,0);ctx.stroke();
    }
    ctx.restore();
  }
}

function checkMilestone(s){
  MILESTONES.forEach(m=>{
    if(s>=m.s&&!heartDone.has(m.s)){heartDone.add(m.s);triggerHeartbreak(m);}
  });
}

function updateHUD(){
  document.getElementById('sc').textContent=score;
  document.getElementById('bs').textContent=best;
  document.getElementById('lv').textContent='♦'.repeat(Math.max(0,lives));
}

function endGame(){
  gameOver=true;running=false;cancelAnimationFrame(raf);
  if(score>best)best=score;updateHUD();
  setTimeout(()=>{
    ot.textContent='— FIN —';
    os.innerHTML=`SCORE: ${score}<br><span style="font-style:italic;font-size:10px;color:#3a4a5a">"Los fragmentos no se reúnen solos."</span>`;
    sb.textContent='↩ REINICIAR';ov.classList.remove('hide');
  },500);
}

function triggerHeartbreak(m){
  const hc=document.getElementById('hc');
  const emojis=['💔','🌑','🩶','☄️','💧','🌫️','🕳️'];
  for(let i=0;i<22;i++){
    setTimeout(()=>{
      const el=document.createElement('div');el.className='hp';
      el.textContent=emojis[Math.floor(Math.random()*emojis.length)];
      el.style.left=Math.random()*100+'vw';
      el.style.fontSize=(13+Math.random()*18)+'px';
      el.style.animationDuration=(2.5+Math.random()*2.5)+'s';
      el.style.animationDelay=(Math.random()*.5)+'s';
      hc.appendChild(el);el.addEventListener('animationend',()=>el.remove());
    },i*75);
  }
  const ban=document.createElement('div');ban.className='eb';
  ban.innerHTML=`<div class="t">${m.e} &nbsp; ${m.t} &nbsp; ${m.e}</div><div class="s">${m.b}</div>`;
  document.body.appendChild(ban);ban.addEventListener('animationend',()=>ban.remove());
}

sb.addEventListener('click',()=>{
  if(paused){paused=false;ov.classList.add('hide');}else startGame();
});
</script>
</body>
</html>
