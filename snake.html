<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SNAKE — ARCADE</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --neon-green: #00ff88;
    --neon-red: #ff3366;
    --neon-yellow: #ffee00;
    --neon-cyan: #00eeff;
    --bg: #050a0e;
    --panel: #0a1520;
    --grid: rgba(0,255,136,0.04);
  }

  body {
    background: var(--bg);
    color: var(--neon-green);
    font-family: 'Press Start 2P', monospace;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    overflow: hidden;
    position: relative;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      repeating-linear-gradient(0deg, transparent, transparent 39px, var(--grid) 40px),
      repeating-linear-gradient(90deg, transparent, transparent 39px, var(--grid) 40px);
    pointer-events: none;
    z-index: 0;
  }

  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background: radial-gradient(ellipse at center, transparent 40%, #050a0e 100%);
    pointer-events: none;
    z-index: 0;
  }

  .container {
    position: relative;
    z-index: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 20px;
  }

  h1 {
    font-size: clamp(18px, 4vw, 32px);
    color: var(--neon-green);
    text-shadow: 0 0 10px var(--neon-green), 0 0 40px rgba(0,255,136,0.4);
    letter-spacing: 8px;
    animation: flicker 4s infinite;
  }

  @keyframes flicker {
    0%,100% { opacity: 1; }
    92% { opacity: 1; }
    93% { opacity: 0.7; }
    94% { opacity: 1; }
    96% { opacity: 0.8; }
    97% { opacity: 1; }
  }

  .hud {
    display: flex;
    gap: 40px;
    font-size: 10px;
    color: rgba(0,255,136,0.6);
  }

  .hud span { color: var(--neon-green); text-shadow: 0 0 8px var(--neon-green); }

  #gameCanvas {
    border: 2px solid rgba(0,255,136,0.3);
    box-shadow:
      0 0 20px rgba(0,255,136,0.2),
      0 0 60px rgba(0,255,136,0.08),
      inset 0 0 40px rgba(0,0,0,0.8);
    background: rgba(0,8,16,0.95);
    display: block;
  }

  #overlay {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 24px;
    background: rgba(5,10,14,0.85);
    backdrop-filter: blur(2px);
    transition: opacity 0.3s;
  }

  #overlay.hidden { opacity: 0; pointer-events: none; }

  .overlay-title {
    font-size: clamp(12px, 3vw, 20px);
    color: var(--neon-green);
    text-shadow: 0 0 20px var(--neon-green);
    text-align: center;
    line-height: 2;
  }

  .overlay-sub {
    font-size: 8px;
    color: var(--neon-cyan);
    text-shadow: 0 0 10px var(--neon-cyan);
    text-align: center;
    line-height: 2.5;
    opacity: 0.8;
  }

  .btn {
    font-family: 'Press Start 2P', monospace;
    font-size: 11px;
    padding: 12px 28px;
    background: transparent;
    color: var(--neon-green);
    border: 2px solid var(--neon-green);
    cursor: pointer;
    text-shadow: 0 0 8px var(--neon-green);
    box-shadow: 0 0 12px rgba(0,255,136,0.3), inset 0 0 12px rgba(0,255,136,0.05);
    transition: all 0.15s;
    letter-spacing: 2px;
  }

  .btn:hover {
    background: rgba(0,255,136,0.1);
    box-shadow: 0 0 24px rgba(0,255,136,0.5), inset 0 0 20px rgba(0,255,136,0.1);
    transform: scale(1.05);
  }

  .canvas-wrapper {
    position: relative;
  }

  .score-flash {
    position: absolute;
    font-size: 9px;
    color: var(--neon-yellow);
    text-shadow: 0 0 10px var(--neon-yellow);
    pointer-events: none;
    animation: scoreUp 0.8s ease-out forwards;
  }

  @keyframes scoreUp {
    from { transform: translateY(0); opacity: 1; }
    to { transform: translateY(-40px); opacity: 0; }
  }

  .controls-hint {
    font-size: 7px;
    color: rgba(0,255,136,0.35);
    letter-spacing: 2px;
    text-align: center;
    line-height: 2.5;
  }

  /* ── HEART EASTER EGG ── */
  #heartContainer {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 50;
    overflow: hidden;
  }

  .heart-particle {
    position: absolute;
    top: -60px;
    font-size: 28px;
    animation: heartFall linear forwards;
    filter: drop-shadow(0 0 8px rgba(255,80,160,0.9));
    user-select: none;
  }

  @keyframes heartFall {
    0%   { transform: translateY(0) rotate(-15deg) scale(0.6); opacity: 0; }
    10%  { opacity: 1; transform: translateY(5vh) rotate(10deg) scale(1.1); }
    50%  { transform: translateY(50vh) rotate(-8deg) scale(1); opacity: 1; }
    100% { transform: translateY(110vh) rotate(20deg) scale(0.8); opacity: 0; }
  }

  .easter-banner {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%) scale(0);
    z-index: 60;
    background: rgba(10,5,20,0.92);
    border: 2px solid #ff50a0;
    padding: 20px 36px;
    text-align: center;
    pointer-events: none;
    animation: bannerPop 2.6s ease forwards;
    box-shadow: 0 0 40px rgba(255,80,160,0.5), inset 0 0 20px rgba(255,80,160,0.08);
  }

  .easter-banner .banner-title {
    font-size: clamp(10px, 2.5vw, 16px);
    color: #ff50a0;
    text-shadow: 0 0 14px #ff50a0;
    letter-spacing: 3px;
    line-height: 2;
  }

  .easter-banner .banner-sub {
    font-size: 8px;
    color: rgba(255,160,210,0.7);
    margin-top: 6px;
    letter-spacing: 2px;
  }

  @keyframes bannerPop {
    0%   { transform: translate(-50%,-50%) scale(0); opacity: 0; }
    15%  { transform: translate(-50%,-50%) scale(1.1); opacity: 1; }
    25%  { transform: translate(-50%,-50%) scale(1); opacity: 1; }
    75%  { transform: translate(-50%,-50%) scale(1); opacity: 1; }
    100% { transform: translate(-50%,-50%) scale(0.8); opacity: 0; }
  }
</style>
</head>
<body>
<div id="heartContainer"></div>
<div class="container">
  <h1>◆ SNAKE ◆</h1>

  <div class="hud">
    <div>SCORE: <span id="scoreDisplay">0</span></div>
    <div>BEST: <span id="bestDisplay">0</span></div>
    <div>LVL: <span id="levelDisplay">1</span></div>
  </div>

  <div class="canvas-wrapper">
    <canvas id="gameCanvas" width="400" height="400"></canvas>
    <div id="overlay">
      <div class="overlay-title" id="overlayTitle">SNAKE</div>
      <div class="overlay-sub" id="overlaySub">
        ↑ ↓ ← → para mover<br>
        ESPACIO para pausar
      </div>
      <button class="btn" id="startBtn">▶ INICIAR</button>
    </div>
  </div>

  <div class="controls-hint">WASD / FLECHAS · ESPACIO = PAUSA</div>
</div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const overlay = document.getElementById('overlay');
const overlayTitle = document.getElementById('overlayTitle');
const overlaySub = document.getElementById('overlaySub');
const startBtn = document.getElementById('startBtn');
const scoreDisplay = document.getElementById('scoreDisplay');
const bestDisplay = document.getElementById('bestDisplay');
const levelDisplay = document.getElementById('levelDisplay');

const CELL = 20;
const COLS = canvas.width / CELL;
const ROWS = canvas.height / CELL;

let snake, dir, nextDir, food, score, best, level, gameLoop, running, paused, gameOver;

function init() {
  snake = [
    {x: 10, y: 10},
    {x: 9, y: 10},
    {x: 8, y: 10},
  ];
  dir = {x: 1, y: 0};
  nextDir = {x: 1, y: 0};
  score = 0;
  level = 1;
  gameOver = false;
  paused = false;
  heartTriggered = new Set();
  spawnFood();
  updateHUD();
}

function spawnFood() {
  let pos;
  do {
    pos = { x: Math.floor(Math.random() * COLS), y: Math.floor(Math.random() * ROWS) };
  } while (snake.some(s => s.x === pos.x && s.y === pos.y));
  food = pos;
}

function getSpeed() {
  return Math.max(60, 200 - (level - 1) * 20);
}

function start() {
  init();
  overlay.classList.add('hidden');
  running = true;
  clearInterval(gameLoop);
  gameLoop = setInterval(tick, getSpeed());
}

function tick() {
  if (paused || gameOver) return;

  dir = { ...nextDir };

  const head = { x: snake[0].x + dir.x, y: snake[0].y + dir.y };

  // Wall collision
  if (head.x < 0 || head.x >= COLS || head.y < 0 || head.y >= ROWS) {
    endGame(); return;
  }
  // Self collision
  if (snake.some(s => s.x === head.x && s.y === head.y)) {
    endGame(); return;
  }

  snake.unshift(head);

  if (head.x === food.x && head.y === food.y) {
    score += 10 * level;
    if (score > best) best = score;
    level = Math.floor(snake.length / 5) + 1;
    checkHeartEasterEgg(score);
    clearInterval(gameLoop);
    gameLoop = setInterval(tick, getSpeed());
    spawnFood();
    showScoreFlash(head.x, head.y);
  } else {
    snake.pop();
  }

  updateHUD();
  draw();
}

function endGame() {
  gameOver = true;
  clearInterval(gameLoop);
  running = false;
  if (score > best) best = score;

  // Death flash
  let flashes = 0;
  const flashInterval = setInterval(() => {
    draw(flashes % 2 === 0);
    flashes++;
    if (flashes >= 6) {
      clearInterval(flashInterval);
      overlayTitle.textContent = '💀 GAME OVER';
      overlaySub.innerHTML = `SCORE: ${score}<br>BEST: ${best}`;
      startBtn.textContent = '↩ REINICIAR';
      overlay.classList.remove('hidden');
    }
  }, 120);
}

function updateHUD() {
  scoreDisplay.textContent = score;
  bestDisplay.textContent = best;
  levelDisplay.textContent = level;
}

function showScoreFlash(gx, gy) {
  const wrapper = document.querySelector('.canvas-wrapper');
  const el = document.createElement('div');
  el.className = 'score-flash';
  el.textContent = `+${10 * level}`;
  el.style.left = (gx * CELL + 4) + 'px';
  el.style.top = (gy * CELL) + 'px';
  wrapper.appendChild(el);
  el.addEventListener('animationend', () => el.remove());
}

function draw(redFlash = false) {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // Background subtle dots
  ctx.fillStyle = 'rgba(0,255,136,0.03)';
  for (let x = 0; x < COLS; x++)
    for (let y = 0; y < ROWS; y++)
      ctx.fillRect(x * CELL + CELL/2 - 1, y * CELL + CELL/2 - 1, 2, 2);

  // Food — pulsing
  const pulse = 0.6 + 0.4 * Math.sin(Date.now() / 200);
  ctx.save();
  ctx.shadowBlur = 20 * pulse;
  ctx.shadowColor = '#ff3366';
  ctx.fillStyle = '#ff3366';
  const fx = food.x * CELL + 3;
  const fy = food.y * CELL + 3;
  const fs = CELL - 6;
  ctx.beginPath();
  ctx.arc(fx + fs/2, fy + fs/2, fs/2 * pulse, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();

  // Snake
  snake.forEach((seg, i) => {
    const isHead = i === 0;
    const t = i / snake.length;
    const alpha = redFlash ? 0.3 : (1 - t * 0.5);

    ctx.save();
    ctx.shadowBlur = isHead ? 20 : 8;
    ctx.shadowColor = redFlash ? '#ff3366' : '#00ff88';

    const color = redFlash
      ? `rgba(255,51,102,${alpha})`
      : isHead
        ? `rgba(0,255,136,${alpha})`
        : `rgba(0,${Math.floor(200 - t * 100)},${Math.floor(100 + t * 80)},${alpha})`;

    ctx.fillStyle = color;
    const pad = isHead ? 1 : 2;
    const r = isHead ? 4 : 3;
    roundRect(ctx, seg.x * CELL + pad, seg.y * CELL + pad, CELL - pad*2, CELL - pad*2, r);
    ctx.fill();

    if (isHead) {
      // Eyes
      ctx.shadowBlur = 0;
      ctx.fillStyle = '#050a0e';
      const ex = seg.x * CELL + CELL/2 + dir.y * 3;
      const ey = seg.y * CELL + CELL/2 + dir.x * 3;
      ctx.beginPath();
      ctx.arc(ex - dir.x * 2 + dir.y * 4, ey - dir.y * 2 + dir.x * 4, 2, 0, Math.PI * 2);
      ctx.fill();
      ctx.beginPath();
      ctx.arc(ex - dir.x * 2 - dir.y * 4, ey - dir.y * 2 - dir.x * 4, 2, 0, Math.PI * 2);
      ctx.fill();
    }

    ctx.restore();
  });
}

function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
}

// Input
document.addEventListener('keydown', e => {
  switch(e.key) {
    case 'ArrowUp': case 'w': case 'W':
      if (dir.y !== 1) nextDir = {x:0,y:-1}; break;
    case 'ArrowDown': case 's': case 'S':
      if (dir.y !== -1) nextDir = {x:0,y:1}; break;
    case 'ArrowLeft': case 'a': case 'A':
      if (dir.x !== 1) nextDir = {x:-1,y:0}; break;
    case 'ArrowRight': case 'd': case 'D':
      if (dir.x !== -1) nextDir = {x:1,y:0}; break;
    case ' ':
      if (running && !gameOver) {
        paused = !paused;
        if (paused) {
          overlayTitle.textContent = '⏸ PAUSA';
          overlaySub.innerHTML = 'ESPACIO para continuar';
          startBtn.textContent = '▶ CONTINUAR';
          overlay.classList.remove('hidden');
        } else {
          overlay.classList.add('hidden');
        }
      }
      e.preventDefault(); break;
  }
});

// Mobile swipe
let touchStart = null;
canvas.addEventListener('touchstart', e => {
  touchStart = e.touches[0];
  e.preventDefault();
}, {passive: false});

canvas.addEventListener('touchend', e => {
  if (!touchStart) return;
  const dx = e.changedTouches[0].clientX - touchStart.clientX;
  const dy = e.changedTouches[0].clientY - touchStart.clientY;
  if (Math.abs(dx) > Math.abs(dy)) {
    if (dx > 20 && dir.x !== -1) nextDir = {x:1,y:0};
    if (dx < -20 && dir.x !== 1) nextDir = {x:-1,y:0};
  } else {
    if (dy > 20 && dir.y !== -1) nextDir = {x:0,y:1};
    if (dy < -20 && dir.y !== 1) nextDir = {x:0,y:-1};
  }
  touchStart = null;
  e.preventDefault();
}, {passive: false});

startBtn.addEventListener('click', () => {
  if (paused) {
    paused = false;
    overlay.classList.add('hidden');
  } else {
    start();
  }
});

// ── HEART EASTER EGG ──
const HEART_MILESTONES = [
  { score: 100,  emoji: '💖', title: '¡AMOR A PRIMERA MORDIDA!', sub: '100 PTS • NIVEL ROMÁNTICO' },
  { score: 250,  emoji: '💗', title: '¡CORAZÓN DE CAMPEÓN!',     sub: '250 PTS • TÚ Y TU SERPIENTE 🐍' },
  { score: 500,  emoji: '💘', title: '¡ENAMORADO DEL JUEGO!',    sub: '500 PTS • MAESTRO SERPENTINO' },
  { score: 1000, emoji: '💝', title: '¡AMOR INFINITO!',          sub: '1000 PTS • LEYENDA VIVIENTE' },
];
let heartTriggered = new Set();

function checkHeartEasterEgg(newScore) {
  for (const m of HEART_MILESTONES) {
    if (newScore >= m.score && !heartTriggered.has(m.score)) {
      heartTriggered.add(m.score);
      triggerHearts(m);
    }
  }
}

function triggerHearts(milestone) {
  const container = document.getElementById('heartContainer');

  // Rain of hearts
  const emojis = ['💖','💗','💓','💕','💞','💝','❤️','🩷'];
  const count = 30;
  for (let i = 0; i < count; i++) {
    setTimeout(() => {
      const el = document.createElement('div');
      el.className = 'heart-particle';
      el.textContent = emojis[Math.floor(Math.random() * emojis.length)];
      el.style.left = Math.random() * 100 + 'vw';
      el.style.fontSize = (18 + Math.random() * 24) + 'px';
      const dur = 2.5 + Math.random() * 2;
      el.style.animationDuration = dur + 's';
      el.style.animationDelay = (Math.random() * 0.5) + 's';
      container.appendChild(el);
      el.addEventListener('animationend', () => el.remove());
    }, i * 60);
  }

  // Banner
  const banner = document.createElement('div');
  banner.className = 'easter-banner';
  banner.innerHTML = `
    <div class="banner-title">${milestone.emoji} ${milestone.title} ${milestone.emoji}</div>
    <div class="banner-sub">${milestone.sub}</div>
  `;
  document.body.appendChild(banner);
  banner.addEventListener('animationend', () => banner.remove());
}

// Idle animation
best = 0;
heartTriggered = new Set();
function idleDraw() {
  if (!running) {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    const t = Date.now() / 1000;
    for (let i = 0; i < 5; i++) {
      const x = (Math.sin(t * 0.7 + i * 1.3) * 0.4 + 0.5) * canvas.width;
      const y = (Math.cos(t * 0.5 + i * 2.1) * 0.4 + 0.5) * canvas.height;
      ctx.save();
      ctx.shadowBlur = 20;
      ctx.shadowColor = '#00ff88';
      ctx.fillStyle = `rgba(0,255,136,${0.1 + i * 0.05})`;
      ctx.beginPath();
      ctx.arc(x, y, 4 + i * 2, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    }
    requestAnimationFrame(idleDraw);
  }
}
idleDraw();
</script>
</body>
</html>
