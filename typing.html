<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ESCRIBE & OLVIDA</title>
<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,700;1,400&family=Courier+Prime:wght@400;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#09080a;--ink:#c8bfa8;--dim:#554a38;--red:#993333;--gold:#c8962a;--paper:#1a1410;}
body{
  background:var(--bg);font-family:'Courier Prime',monospace;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  min-height:100vh;overflow:hidden;color:var(--ink);
}
/* Paper texture */
body::before{
  content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background:
    radial-gradient(ellipse 70% 60% at 50% 40%, rgba(30,22,14,.4) 0%, transparent 70%),
    repeating-linear-gradient(0deg,transparent,transparent 28px,rgba(200,191,168,.02) 28px,rgba(200,191,168,.02) 29px);
}
.wrap{position:relative;z-index:1;display:flex;flex-direction:column;align-items:center;gap:10px;}
h1{
  font-family:'EB Garamond',serif;font-weight:700;font-style:italic;
  font-size:clamp(18px,4vw,32px);letter-spacing:5px;color:var(--ink);
  text-shadow:0 0 20px rgba(200,191,168,.15);
}
.tagline{font-size:10px;letter-spacing:5px;color:var(--dim);font-style:italic;margin-top:-6px;font-family:'EB Garamond',serif;}
.hud{display:flex;gap:28px;font-size:11px;letter-spacing:3px;color:var(--dim);}
.hud span{color:var(--ink);}
.lives{display:flex;gap:6px;font-size:16px;}
.cw{position:relative;}
canvas{display:block;background:var(--paper);border:1px solid rgba(200,191,168,.1);
  box-shadow:0 0 40px rgba(0,0,0,.9);}
/* Input area */
.input-row{
  display:flex;align-items:center;gap:10px;
  width:100%;max-width:520px;
}
#typeInput{
  flex:1;font-family:'Courier Prime',monospace;font-size:18px;
  background:rgba(26,20,16,.8);border:none;border-bottom:1px solid rgba(200,191,168,.25);
  color:var(--ink);padding:8px 4px;outline:none;letter-spacing:2px;
  caret-color:var(--gold);text-align:center;
}
#typeInput::placeholder{color:rgba(200,191,168,.2);font-style:italic;font-size:13px;}
#typeInput.shake{animation:shake .2s ease;}
@keyframes shake{0%,100%{transform:translateX(0);}25%{transform:translateX(-6px);}75%{transform:translateX(6px);};}
/* Overlay */
#ov{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;
    justify-content:center;gap:18px;background:rgba(6,5,4,.93);transition:opacity .3s;}
#ov.hide{opacity:0;pointer-events:none;}
.ot{font-family:'EB Garamond',serif;font-weight:700;font-style:italic;
    font-size:clamp(14px,3vw,22px);color:var(--ink);text-align:center;letter-spacing:4px;line-height:1.8;}
.os{font-size:11px;color:var(--dim);text-align:center;line-height:2.4;letter-spacing:2px;font-style:italic;}
.btn{font-family:'EB Garamond',serif;font-size:15px;font-style:italic;font-weight:700;letter-spacing:4px;
     padding:10px 28px;background:transparent;color:var(--ink);
     border:1px solid rgba(200,191,168,.3);cursor:pointer;transition:all .2s;}
.btn:hover{background:rgba(200,191,168,.06);border-color:var(--ink);}
/* Heartbreak easter egg */
#hc{position:fixed;inset:0;pointer-events:none;z-index:200;overflow:hidden;}
.hp{position:absolute;top:-60px;animation:hfall linear forwards;user-select:none;}
@keyframes hfall{0%{transform:translateY(0) scale(.4);opacity:0;}10%{opacity:.85;}100%{transform:translateY(110vh) scale(.5);opacity:0;}}
.eb{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%) scale(0);z-index:210;
    background:rgba(6,5,4,.98);border:1px solid rgba(200,191,168,.2);
    padding:22px 38px;text-align:center;pointer-events:none;animation:bpop 3.2s ease forwards;
    font-family:'EB Garamond',serif;}
.eb .t{font-style:italic;font-weight:700;font-size:clamp(11px,2vw,16px);color:var(--ink);letter-spacing:3px;line-height:2.2;}
.eb .s{font-size:11px;color:var(--dim);margin-top:6px;letter-spacing:2px;}
@keyframes bpop{0%{transform:translate(-50%,-50%) scale(0);opacity:0;}12%{transform:translate(-50%,-50%) scale(1.04);opacity:1;}20%,78%{transform:translate(-50%,-50%) scale(1);opacity:1;}100%{transform:translate(-50%,-50%) scale(.9);opacity:0;}}
</style>
</head>
<body>
<div id="hc"></div>
<div class="wrap">
  <h1>Escribe & Olvida</h1>
  <div class="tagline">— escribe las palabras que no pudiste decir —</div>
  <div class="hud">
    <div>SCORE: <span id="sc">0</span></div>
    <div>MEJOR: <span id="bs">0</span></div>
    <div>NIVEL: <span id="lv">1</span></div>
  </div>
  <div class="lives" id="livesEl">🖤🖤🖤🖤🖤🖤🖤🖤</div>
  <div class="cw">
    <canvas id="c" width="520" height="340"></canvas>
    <div id="ov">
      <div class="ot" id="ot">Escribe & Olvida</div>
      <div class="os" id="os">Las palabras caen.<br>Escríbelas antes de que toquen el suelo.<br><em>Cada una que dejas caer es una herida.</em></div>
      <button class="btn" id="sb">▶ Escribir</button>
    </div>
  </div>
  <div class="input-row">
    <input id="typeInput" type="text" placeholder="escribe aquí para empezar a olvidar…" autocomplete="off" autocorrect="off" spellcheck="false"/>
  </div>
</div>

<script>
const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');
const ov     = document.getElementById('ov');
const ot     = document.getElementById('ot');
const os     = document.getElementById('os');
const sb     = document.getElementById('sb');
const input  = document.getElementById('typeInput');
const W = canvas.width, H = canvas.height;

// ── WORDS ─────────────────────────────────────────────
const WORDS = [
  'olvido','silencio','adiós','vacío','ausencia','distancia',
  'mentira','promesa','tarde','nunca','solo','frío',
  'espera','llanto','herida','culpa','roto','perdido',
  'recuerdo','sombra','nostalgia','invierno','hueco','oscuro',
  'dejaste','olvidaste','mentiste','ignoraste','marchaste',
  'lágrimas','susurro','ceniza','tormenta','niebla','grieta',
  'abandono','traición','soledad','desamor','despedida',
  'fantasma','ruinas','cicatriz','amargura','rendirse',
  'exhausta','indiferente','efímero','inexorable','invisible',
];

// ── MILESTONES ────────────────────────────────────────
const MILESTONES = [
  {s:50,   e:'🖋️', t:'LAS PRIMERAS PALABRAS',       b:'"Empezaste a escribir lo que callabas."'},
  {s:150,  e:'💔', t:'EL PAPEL SE MOJA',             b:'"No es tinta. Nunca lo fue."'},
  {s:300,  e:'🥀', t:'MITAD DEL CUADERNO',           b:'"Quedan páginas. No sé si quiero llenarlas."'},
  {s:500,  e:'🌧️', t:'ESCRIBE BAJO LA LLUVIA',       b:'"Las palabras se borran. Las tuyas también."'},
  {s:800,  e:'🖤', t:'EL TINTERO VACÍO',             b:'"Escribiste tanto que ya no queda nada."'},
  {s:1200, e:'🌑', t:'LA ÚLTIMA CARTA',              b:'"Esta vez no tiene destinatario."'},
  {s:1800, e:'✒️', t:'POEMA SIN TÍTULO',             b:'"Lo mejor que escribiste no tiene nombre."'},
];

// ── STATE ─────────────────────────────────────────────
let words, score, best=0, lives, level;
let running=false, gameOver=false;
let heartDone=new Set(), raf=0, tick=0;
let spawnTimer=0, spawnInterval=120;
let particles=[];

// ── INIT ──────────────────────────────────────────────
function initGame(){
  score=0; lives=8; level=1;
  heartDone=new Set(); gameOver=false; tick=0;
  words=[]; particles=[]; spawnTimer=0; spawnInterval=160;
  updateHUD();
}

function startGame(){
  initGame();
  ov.classList.add('hide');
  running=true;
  input.value='';
  input.focus();
  cancelAnimationFrame(raf);
  loop();
}

// ── WORD OBJECTS ──────────────────────────────────────
function spawnWord(){
  const text = WORDS[Math.floor(Math.random()*WORDS.length)];
  const fontSize = 15 + Math.floor(Math.random()*8);
  ctx.font = `${fontSize}px Courier Prime`;
  const tw = ctx.measureText(text).width;
  const x = 10 + Math.random()*(W-tw-20);
  const speed = 0.22 + Math.random()*0.18 + (level-1)*0.04;
  const hue = Math.random();
  words.push({text, x, y:-20, speed, fontSize, tw,
    typed:'', color: hue<0.3?'#cc6644': hue<0.6?'#6688aa':'#aaa888',
    wobble: Math.random()*Math.PI*2, wobbleSpd:(Math.random()-.5)*.02});
}

// ── INPUT ─────────────────────────────────────────────
input.addEventListener('input', e=>{
  if(!running||gameOver) return;
  const val = input.value.trim().toLowerCase();

  // Find matching word
  let matched = null;
  for(const w of words){
    if(w.text.startsWith(val) && val.length>0){
      if(!matched || val.length > matched.typed.length) matched=w;
    }
  }

  // Check exact match
  const exact = words.find(w=>w.text===val);
  if(exact){
    destroyWord(exact);
    input.value='';
    return;
  }

  // Highlight active word
  words.forEach(w=>{ w.active = w===matched; });
});

document.addEventListener('keydown',e=>{
  if(e.key==='Escape'){ input.value=''; words.forEach(w=>w.active=false); }
});

function destroyWord(w){
  const idx=words.indexOf(w);
  if(idx===-1) return;
  words.splice(idx,1);
  score += w.text.length * level;
  if(score>best) best=score;
  checkMilestone(score);
  // Particle burst
  for(let i=0;i<10;i++){
    const ang=Math.random()*Math.PI*2, spd=1+Math.random()*3;
    particles.push({x:w.x+w.tw/2, y:w.y, vx:Math.cos(ang)*spd, vy:Math.sin(ang)*spd,
      life:1, color:w.color, size:2+Math.random()*3});
  }
  updateHUD();
  // Update interval
  spawnInterval = Math.max(100, 160 - score/40);
  level = Math.max(1, Math.floor(score/300)+1);
}

// ── LOOP ──────────────────────────────────────────────
function loop(){
  if(!running) return;
  if(!gameOver){ update(); }
  draw();
  raf=requestAnimationFrame(loop);
}

function update(){
  tick++;
  spawnTimer++;
  if(spawnTimer>=spawnInterval){
    spawnWord();
    spawnTimer=0;
    // Also spawn extra at higher levels
    if(level>5 && Math.random()<0.2) spawnWord();
  }

  // Move words
  for(let i=words.length-1;i>=0;i--){
    const w=words[i];
    w.wobble+=w.wobbleSpd;
    w.y+=w.speed;
    if(w.y>H+20){
      words.splice(i,1);
      lives--;
      updateHUD();
      shakeInput();
      if(lives<=0){ endGame(); return; }
    }
  }

  // Particles
  for(let i=particles.length-1;i>=0;i--){
    const p=particles[i];
    p.x+=p.vx; p.y+=p.vy; p.vy+=0.05;
    p.life-=0.04;
    if(p.life<=0) particles.splice(i,1);
  }
}

function shakeInput(){
  input.classList.remove('shake');
  void input.offsetWidth;
  input.classList.add('shake');
}

// ── DRAW ──────────────────────────────────────────────
function draw(){
  ctx.fillStyle='#1a1410'; ctx.fillRect(0,0,W,H);

  // Subtle lined paper
  ctx.strokeStyle='rgba(200,191,168,.04)'; ctx.lineWidth=1;
  for(let y=28;y<H;y+=28){
    ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(W,y); ctx.stroke();
  }

  // Particles
  particles.forEach(p=>{
    ctx.save();
    ctx.globalAlpha=p.life;
    ctx.fillStyle=p.color;
    ctx.shadowBlur=4; ctx.shadowColor=p.color;
    ctx.fillRect(p.x-p.size/2,p.y-p.size/2,p.size,p.size);
    ctx.restore();
  });

  // Words
  words.forEach(w=>{
    const wobX = Math.sin(w.wobble)*1.5;
    ctx.save();

    // Glow for active word
    if(w.active){
      ctx.shadowBlur=16; ctx.shadowColor=w.color;
    }

    // Draw typed part (brighter) + remaining (dimmer)
    const typed = input.value.trim().toLowerCase();
    const matchLen = w.active ? typed.length : 0;

    ctx.font=`${w.fontSize}px Courier Prime`;
    ctx.textBaseline='middle';

    // Draw each character
    let cx=w.x+wobX;
    for(let i=0;i<w.text.length;i++){
      const ch=w.text[i];
      const chW=ctx.measureText(ch).width;
      if(i<matchLen){
        ctx.fillStyle='#f0e0b0';
        ctx.shadowBlur=10; ctx.shadowColor='#c8962a';
      } else {
        ctx.fillStyle=w.active?w.color:w.color+'99';
        ctx.shadowBlur=w.active?4:0;
      }
      ctx.fillText(ch,cx,w.y);
      cx+=chW;
    }

    // Danger indicator: red tint when close to bottom
    if(w.y>H*0.75){
      const danger=(w.y-H*0.75)/(H*0.25);
      ctx.globalAlpha=danger*0.3;
      ctx.fillStyle='#993333';
      ctx.fillRect(w.x-2,w.y-w.fontSize/2-2,w.tw+4,w.fontSize+4);
    }

    ctx.restore();
  });

  // Bottom line
  ctx.strokeStyle='rgba(153,51,51,.4)'; ctx.lineWidth=1.5;
  ctx.beginPath(); ctx.moveTo(0,H-2); ctx.lineTo(W,H-2); ctx.stroke();
}

// ── HUD & MILESTONES ──────────────────────────────────
function updateHUD(){
  document.getElementById('sc').textContent=score;
  document.getElementById('bs').textContent=best;
  document.getElementById('lv').textContent=level;
  document.getElementById('livesEl').textContent='🖤'.repeat(Math.max(0,lives));
}

function checkMilestone(s){
  MILESTONES.forEach(m=>{
    if(s>=m.s&&!heartDone.has(m.s)){heartDone.add(m.s);triggerHeartbreak(m);}
  });
}

function endGame(){
  gameOver=true; running=false;
  if(score>best) best=score;
  cancelAnimationFrame(raf);
  setTimeout(()=>{
    ot.textContent='— FIN —';
    os.innerHTML=`${score} palabras olvidadas<br><em style="font-size:10px;color:#554a38">"Escribiste todo lo que sentías.<br>No sirvió de nada. Pero lo hiciste."</em>`;
    sb.textContent='↩ Escribir de nuevo';
    ov.classList.remove('hide');
  },500);
}

function triggerHeartbreak(m){
  const hc=document.getElementById('hc');
  const emojis=['💔','🖤','🥀','🌧️','🖋️','💧','✒️','📄'];
  for(let i=0;i<26;i++){
    setTimeout(()=>{
      const el=document.createElement('div'); el.className='hp';
      el.textContent=emojis[Math.floor(Math.random()*emojis.length)];
      el.style.left=Math.random()*100+'vw';
      el.style.fontSize=(13+Math.random()*20)+'px';
      el.style.animationDuration=(2.4+Math.random()*2.2)+'s';
      el.style.animationDelay=(Math.random()*.6)+'s';
      hc.appendChild(el); el.addEventListener('animationend',()=>el.remove());
    },i*68);
  }
  const ban=document.createElement('div'); ban.className='eb';
  ban.innerHTML=`<div class="t">${m.e} &nbsp; ${m.t} &nbsp; ${m.e}</div><div class="s">${m.b}</div>`;
  document.body.appendChild(ban); ban.addEventListener('animationend',()=>ban.remove());
}

// ── START ─────────────────────────────────────────────
sb.addEventListener('click',()=>{
  startGame();
});

// Auto-focus input when clicking canvas area
canvas.addEventListener('click',()=>input.focus());
</script>
</body>
</html>
